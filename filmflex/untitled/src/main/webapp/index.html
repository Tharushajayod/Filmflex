<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMFLEX - Movie Rental and Review Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #e50914;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .tagline {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
        }

        .cta-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .cta-button:hover {
            background-color: #f40612;
            transform: scale(1.05);
        }

        .nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .nav a:hover {
            color: #e50914;
        }

        .audio-player {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 2;
            width: 340px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.16);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .cover {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff0080, #7928ca);
            flex-shrink: 0;
        }

        .audio-meta {
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .audio-meta h3 {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .audio-meta p {
            margin-bottom: 8px;
            font-size: 0.78rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .audio-meta audio {
            width: 100%;
            display: block;
            filter: invert(1) hue-rotate(180deg) saturate(0.6);
        }

        .no-video #video-background {
            display: none;
        }

        .no-video .fallback-image {
            display: block;
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
            }

            .tagline {
                font-size: 1.1rem;
                max-width: 90%;
            }

            .audio-player {
                right: 10px;
                bottom: 10px;
                width: calc(100% - 20px);
                max-width: 320px;
                padding: 12px;
            }

            .audio-meta p {
                font-size: 0.72rem;
            }

            .nav {
                top: 15px;
                right: 15px;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Video -->
    <video autoplay muted loop id="video-background">
        <source src="assets/Video/Trailer.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
    </video>

    <!-- Fallback image (hidden by default) -->
    <img src="assets/images/fallback.jpg" alt="FILMFLEX Background" class="fallback-image" style="display: none;">

    <!-- Dark overlay -->
    <div class="overlay"></div>

    <!-- Main content -->
    <div class="content">
        <div class="nav">
            <a href="login.html">Login</a>
            <a href="register.html">Register</a>
        </div>

        <h1 class="logo">FILMFLEX</h1>
        <p class="tagline">Your ultimate movie rental and review platform. Discover, rent, and review thousands of movies from classics to the latest releases.</p>
        <a href="login.html" class="cta-button">Get Started</a>
    </div>

    <!-- Bottom-right MP3 player -->
    <div class="audio-player">
        <div class="cover">♫</div>
        <div class="audio-meta">
            <h3>Featured Soundtrack</h3>
            <p>Replace the file path below with your own MP3 file.</p>
            <audio controls preload="none">
                <source src="assets/audio/song.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('video-background');

            video.play().catch(function(error) {
                document.body.classList.add('no-video');
                console.log("Video playback failed, using fallback image");
            });

            if (video.readyState < 3) {
                video.addEventListener('error', function() {
                    document.body.classList.add('no-video');
                });
            }
        });
    </script>
</body>
</html>
