<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMFLEX - My Rentals</title>
    <link rel="stylesheet" href="css/RentalHistory.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <a href="index.html" class="logo">FILMFLEX</a>
    <nav class="nav-links">
        <a href="UserDashboard.html">Home</a>
        <a href="movie.html">Movies</a>
    </nav>
    <div class="user-actions">
        <div class="user-avatar" id="userAvatar">U</div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
</header>

<!-- Main Content -->
<div class="container">
    <h1 class="dashboard-title">My Account</h1>

    <div class="dashboard-grid">
        <!-- Sidebar -->
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="UserDashboard.html">Account Details</a></li>
                <li><a href="#">Watched History</a></li>
                <li><a href="#">My Reviews</a></li>
                <li><a href="PaymentMethods.html">Payment Methods</a></li>
                <li><a href="Ticketpage.html">Ticket</a></li>
                <li><a href="RentalHistory.html" class="active">My Rentals</a></li>
            </ul>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <div class="success-message" id="successMessage"></div>
            <div class="error-message"   id="errorMessage"></div>

            <div class="section-header">
                <h2 class="section-title">My Rentals</h2>
                <button class="btn" id="rentNewBtn" onclick="window.location.href='movie.html'">
                    + Rent a Movie
                </button>
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="tab-btn active" data-filter="ALL">All</button>
                <button class="tab-btn" data-filter="ACTIVE">Active</button>
                <button class="tab-btn" data-filter="RETURNED">Returned</button>
            </div>

            <!-- Rental List -->
            <div id="rentalList">
                <div class="loading-msg" id="loadingMsg">Loading rentals...</div>
                <div class="empty-msg" id="emptyMsg" style="display:none;">
                    No rentals found. <a href="movie.html">Browse movies</a> to rent one!
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Return Confirmation Modal -->
<div class="modal-overlay" id="returnModal" style="display:none;">
    <div class="modal">
        <h3>Return Movie</h3>
        <p>Are you sure you want to return <strong id="returnMovieName"></strong>?</p>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn" id="confirmReturnBtn">Yes, Return</button>
        </div>
    </div>
</div>

<script>
    const BASE_URL = '';
    let currentFilter = 'ALL';
    let allRentals = [];
    let returnTargetId = null;

    // ── Auth ──────────────────────────────────────────────────
    function getSession() {
        try { return JSON.parse(sessionStorage.getItem('user')); } catch { return null; }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const user = getSession();
        if (!user) { window.location.href = 'login.html'; return; }

        document.getElementById('userAvatar').textContent =
            (user.fullName || user.email || 'U')[0].toUpperCase();

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // Tab filter buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderRentals();
            });
        });

        loadRentals(user.email);
    });

    // ── Load rentals from API ─────────────────────────────────
    async function loadRentals(email) {
        try {
            const res = await fetch(`${BASE_URL}/rental?email=${encodeURIComponent(email)}`);
            if (!res.ok) throw new Error('Failed to load rentals');
            allRentals = await res.json();
            renderRentals();
        } catch (err) {
            showError('Could not load rentals: ' + err.message);
        } finally {
            document.getElementById('loadingMsg').style.display = 'none';
        }
    }

    // ── Render based on current filter ───────────────────────
    function renderRentals() {
        const list = document.getElementById('rentalList');
        const emptyMsg = document.getElementById('emptyMsg');

        const filtered = currentFilter === 'ALL'
            ? allRentals
            : allRentals.filter(r => r.status === currentFilter);

        // Remove old cards
        list.querySelectorAll('.rental-card').forEach(c => c.remove());

        if (filtered.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        }
        emptyMsg.style.display = 'none';

        filtered.forEach(rental => {
            list.appendChild(buildCard(rental));
        });
    }

    // ── Build a rental card element ───────────────────────────
    function buildCard(rental) {
        const card = document.createElement('div');
        card.className = 'rental-card';
        card.innerHTML = `
            <div class="rental-info">
                <div class="movie-icon">🎬</div>
                <div class="rental-details">
                    <h3 class="movie-title">${escHtml(rental.movieTitle)}</h3>
                    <div class="rental-dates">
                        <span>📅 Start: ${rental.startDate}</span>
                        <span>⏰ End: ${rental.endDate}</span>
                    </div>
                    <span class="rental-id">ID: ${rental.rentalId.substring(0,8)}...</span>
                </div>
            </div>
            <div class="rental-actions">
                <span class="status-badge status-${rental.status.toLowerCase()}">${rental.status}</span>
                ${rental.status === 'ACTIVE'
                    ? `<button class="btn btn-return" data-id="${escHtml(rental.rentalId)}" data-title="${escHtml(rental.movieTitle)}">Return</button>`
                    : ''}
            </div>
        `;

        const returnBtn = card.querySelector('.btn-return');
        if (returnBtn) {
            returnBtn.addEventListener('click', () => {
                openReturnModal(returnBtn.dataset.id, returnBtn.dataset.title);
            });
        }
        return card;
    }

    // ── Return modal ──────────────────────────────────────────
    function openReturnModal(rentalId, movieTitle) {
        returnTargetId = rentalId;
        document.getElementById('returnMovieName').textContent = movieTitle;
        document.getElementById('returnModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('returnModal').style.display = 'none';
        returnTargetId = null;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('confirmReturnBtn').addEventListener('click', async () => {
            if (!returnTargetId) return;
            const user = getSession();
            try {
                const res = await fetch(
                    `${BASE_URL}/rental?rentalId=${encodeURIComponent(returnTargetId)}&email=${encodeURIComponent(user.email)}`,
                    { method: 'PUT' }
                );
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Return failed');
                showSuccess(data.message);
                closeModal();
                loadRentals(user.email);
            } catch (err) {
                showError(err.message);
                closeModal();
            }
        });
    });

    // ── Helpers ───────────────────────────────────────────────
    function showSuccess(msg) {
        const el = document.getElementById('successMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
