<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMFLEX - Movie Rental and Review Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            overflow: hidden;
            height: 100vh;
            color: white;
            background-color: black;
        }

        #video-background {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        /* Base Dark Overlay over video */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Cinematic Black Shade Gradients (Top and Bottom) */
        .gradient-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25vh; /* 25% of top display screen */
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .gradient-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh; /* 25% of bottom display screen */
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #e50914;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            max-width: 800px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            line-height: 1.4;
        }

        .cta-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
        }

        .cta-button:hover {
            background-color: #f40612;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.6);
        }

        .nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
            z-index: 2;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        .nav a:hover {
            color: #e50914;
        }

        .no-video #video-background {
            display: none;
        }

        .no-video .fallback-image {
            display: block;
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
            }

            .tagline {
                font-size: 1.1rem;
                max-width: 90%;
            }

            .nav {
                top: 15px;
                right: 15px;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<video autoplay muted loop id="video-background">
    <source src="assets/Video/Trailer.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>

<img src="assets/images/default-poster.jpg" alt="FILMFLEX Background" class="fallback-image" style="display: none;">

<div class="overlay"></div>
<div class="gradient-top"></div>
<div class="gradient-bottom"></div>

<div class="content">
    <div class="nav">
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </div>

    <h1 class="logo">FILMFLEX</h1>
    <p class="tagline">Your ultimate movie rental and review platform. Discover, rent, and review thousands of movies from classics to the latest releases.</p>
    <a href="login.html" class="cta-button">Get Started</a>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const video = document.getElementById('video-background');

        video.play().catch(function(error) {
            document.body.classList.add('no-video');
            console.log("Video playback failed, using fallback image");
        });

        if (video.readyState < 3) {
            video.addEventListener('error', function() {
                document.body.classList.add('no-video');
            });
        }
    });
</script>
</body>
</html>
