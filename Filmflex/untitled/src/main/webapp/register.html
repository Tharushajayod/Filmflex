<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILMFLEX - Sign Up</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --red: #e50914;
            --red-hover: #f40612;
            --dark: #141414;
            --card: rgba(0,0,0,0.78);
            --border: rgba(255,255,255,0.1);
            --input-bg: #2a2a2a;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: var(--dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ── FIXED: overflow: hidden අයින් කරලා auto දැම්මා ── */
            overflow-y: auto;
        }

        /* ── Video BG ── */
        #videoBg {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.35;
        }
        .overlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg,
            rgba(0,0,0,0.85) 0%,
            rgba(20,0,0,0.7) 50%,
            rgba(0,0,0,0.85) 100%);
            z-index: 1;
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
            /* ── FIXED: උඩටයි යටටයි scroll කරද්දි ඉඩ ඉතුරු වෙන්න padding දුන්නා ── */
            padding: 40px 1.5rem;
        }

        /* ── Logo ── */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-text {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: white;
        }
        .logo-text span { color: var(--red); }
        .logo-sub {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Card ── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .card-sub {
            color: rgba(255,255,255,0.4);
            font-size: 0.88rem;
            margin-bottom: 2rem;
        }

        /* ── Form fields ── */
        .field {
            margin-bottom: 1.2rem;
        }
        .field label {
            display: block;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.55);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 13px 16px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .field input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
        }
        .field input::placeholder { color: rgba(255,255,255,0.25); }

        /* ── Buttons ── */
        .btn-signin {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-signin:hover:not(:disabled) {
            background: var(--red-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(229,9,20,0.4);
        }

        /* ── Footer links ── */
        .card-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
        }
        .card-footer a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .card-footer a:hover { color: var(--red); }

        @media (max-width: 480px) {
            .card { padding: 2rem 1.5rem; }
            .logo-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<video autoplay muted loop playsinline id="videoBg">
    <source src="assets/Video/Trailer3.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<div class="page">
    <div class="logo">
        <div class="logo-text">FILM<span>FLEX</span></div>
        <div class="logo-sub">Movie Rental &amp; Review</div>
    </div>

    <div class="card">
        <div class="card-title">Create Account</div>
        <div class="card-sub">Join us to start your movie journey</div>

        <form action="register" method="POST" id="signupForm">
            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="field">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
                <small style="color: #aaa; font-size: 0.78rem; display: block; margin-top: 4px;">Password must be at least 8 characters.</small>
            </div>

            <div class="field">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
            </div>

            <div class="field" style="display: flex; align-items: center; margin-top: 1.5rem; margin-bottom: 1.5rem;">
                <input type="checkbox" id="terms" name="terms" required style="margin-right: 10px; width: auto; accent-color: var(--red); cursor: pointer;">
                <label for="terms" style="margin: 0; text-transform: none; letter-spacing: normal; font-size: 0.88rem;">
                    I agree to the <a href="#" style="color: var(--red); text-decoration: none;">Terms &amp; Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn-signin" id="signupBtn">
                <span class="btn-text">Sign Up</span>
            </button>
        </form>

        <div class="card-footer" style="margin-top:1.2rem;">
            Already have an account? <a href="login.html">Sign in now</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm-password');
        const signupForm = document.getElementById('signupForm');
        const termsCheckbox = document.getElementById('terms');

        function validatePassword() {
            if (password.value !== confirmPassword.value) {
                confirmPassword.setCustomValidity("Passwords don't match");
            } else {
                confirmPassword.setCustomValidity('');
            }
        }

        password.onchange = validatePassword;
        confirmPassword.onkeyup = validatePassword;

        signupForm.addEventListener('submit', function (e) {
            if (!termsCheckbox.checked) {
                alert("You must agree to the Terms & Conditions.");
                e.preventDefault();
            }
        });
    });
</script>
</body>
</html>
